<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Business Pro - Enterprise Management</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- IN-MEMORY/LOCAL STORAGE SIMULATED DATABASE ---
        // To make it run natively on GitHub Pages with full features instantly!
        const initDB = () => {
            const data = localStorage.getItem('sl_biz_db');
            if (data) return JSON.parse(data);
            
            return {
                companies: [],
                employees: [],
                customers: [],
                products: [],
                orders: []
            };
        };

        const saveDB = (dbData) => {
            localStorage.setItem('sl_biz_db', JSON.stringify(dbData));
        };

        function App() {
            const [db, setDb] = useState(initDB());
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('sl_user')) || null);
            const [isRegister, setIsRegister] = useState(false);
            const [view, setView] = useState('dashboard');
            
            // Forms
            const [authForm, setAuthForm] = useState({ username: '', password: '', fullName: '', companyName: '', phone: '', email: '' });
            const [custForm, setCustForm] = useState({ name: '', phone: '', email: '', address: '', notes: '', outstanding: 0 });
            const [prodForm, setProdForm] = useState({ itemName: '', itemCode: '', category: '', costPrice: 0, sellingPrice: 0, quantity: 0, barcode: '', lowStock: 5 });
            const [orderForm, setOrderForm] = useState({ customerId: '', itemId: '', quantity: 1, paymentMethod: 'Cash' });
            const [empForm, setEmpForm] = useState({ fullName: '', username: '', password: '' });

            const handleRegister = (e) => {
                e.preventDefault();
                const companyCode = 'SLB' + Math.floor(1000 + Math.random() * 9000);
                const newCompany = {
                    company_code: companyCode,
                    full_name: authForm.fullName,
                    company_name: authForm.companyName,
                    phone: authForm.phone,
                    email: authForm.email,
                    username: authForm.username,
                    password: authForm.password // In-browser secure validation
                };
                
                const updatedDB = { ...db, companies: [...db.companies, newCompany] };
                setDb(updatedDB);
                saveDB(updatedDB);
                alert(`🎉 ලියාපදිංචිය සාර්ථකයි!\nCompany Code: ${companyCode}\nදැන් Login වන්න.`);
                setIsRegister(false);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                // Check Admin
                const admin = db.companies.find(c => c.username === authForm.username && c.password === authForm.password);
                if (admin) {
                    const session = { role: 'ADMIN', name: admin.full_name, companyCode: admin.company_code, companyName: admin.company_name };
                    localStorage.setItem('sl_user', JSON.stringify(session));
                    setUser(session);
                    return;
                }
                // Check Employee
                const emp = db.employees.find(e => e.username === authForm.username && e.password === authForm.password);
                if (emp) {
                    const session = { role: 'EMPLOYEE', name: emp.full_name, companyCode: emp.company_code, companyName: 'Enterprise' };
                    localStorage.setItem('sl_user', JSON.stringify(session));
                    setUser(session);
                    return;
                }
                alert('Invalid Username or Password!');
            };

            const handleAddCustomer = (e) => {
                e.preventDefault();
                const newCust = { id: Date.now(), company_code: user.companyCode, ...custForm };
                const updatedDB = { ...db, customers: [...db.customers, newCust] };
                setDb(updatedDB);
                saveDB(updatedDB);
                alert('Customer Added Successfully!');
                setView('customers');
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                const newProd = { id: Date.now(), company_code: user.companyCode, ...prodForm };
                const updatedDB = { ...db, products: [...db.products, newProd] };
                setDb(updatedDB);
                saveDB(updatedDB);
                alert('Product Added Successfully!');
                setView('products');
            };

            const handleCreateOrder = (e) => {
                e.preventDefault();
                const cust = db.customers.find(c => c.id == orderForm.customerId);
                const prod = db.products.find(p => p.id == orderForm.itemId);
                
                if (prod.quantity < orderForm.quantity) {
                    alert('ප්‍රමාණවත් තොග නොමැත (Low Stock)!');
                    return;
                }

                const newOrder = {
                    id: Date.now(),
                    company_code: user.companyCode,
                    order_number: 'ORD-' + Math.floor(100000 + Math.random() * 900000),
                    customer_name: cust.name,
                    item_name: prod.item_name,
                    item_id: prod.id,
                    quantity: parseInt(orderForm.quantity),
                    total_amount: orderForm.quantity * prod.selling_price,
                    employee_name: user.name,
                    status: 'Pending',
                    date: new Date().toLocaleDateString()
                };

                const updatedDB = { ...db, orders: [...db.orders, newOrder] };
                setDb(updatedDB);
                saveDB(updatedDB);
                alert('Order Placed! Waiting for Admin Approval.');
                setView('orders');
            };

            const handleAddEmployee = (e) => {
                e.preventDefault();
                const newEmp = { id: Date.now(), company_code: user.companyCode, ...empForm };
                const updatedDB = { ...db, employees: [...db.employees, newEmp] };
                setDb(updatedDB);
                saveDB(updatedDB);
                alert('Employee Account Created!');
                setView('employees');
            };

            const updateStatus = (orderId, newStatus) => {
                const updatedOrders = db.orders.map(o => {
                    if (o.id === orderId) {
                        if (newStatus === 'Approved') {
                            // Automatically Deduct Stock
                            db.products = db.products.map(p => {
                                if (p.id === o.item_id) return { ...p, quantity: p.quantity - o.quantity };
                                return p;
                            });
                        }
                        return { ...o, status: newStatus };
                    }
                    return o;
                });
                const updatedDB = { ...db, orders: updatedOrders };
                setDb(updatedDB);
                saveDB(updatedDB);
            };

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(myOrders);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Sales Report");
                XLSX.writeFile(wb, "Business_Report.xlsx");
            };

            const logout = () => {
                localStorage.removeItem('sl_user');
                setUser(null);
            };

            // Filter data safe for multi-company isolation
            const myCustomers = db.customers.filter(c => c.company_code === user?.companyCode);
            const myProducts = db.products.filter(p => p.company_code === user?.companyCode);
            const myOrders = db.orders.filter(o => o.company_code === user?.companyCode);
            const myEmployees = db.employees.filter(e => e.company_code === user?.companyCode);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                        <div className="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800">
                            <h2 className="text-3xl font-bold text-center text-blue-500 mb-6">{isRegister ? 'Business Register' : 'SL Business Sign In'}</h2>
                            <form onSubmit={isRegister ? handleRegister : handleLogin} className="space-y-4">
                                {isRegister && (
                                    <>
                                        <input type="text" placeholder="Full Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setAuthForm({...authForm, fullName: e.target.value})} required />
                                        <input type="text" placeholder="Business Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required />
                                        <input type="text" placeholder="Phone" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setAuthForm({...authForm, phone: e.target.value})} />
                                    </>
                                )}
                                <input type="text" placeholder="Username" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setAuthForm({...authForm, username: e.target.value})} required />
                                <input type="password" placeholder="Password" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setAuthForm({...authForm, password: e.target.value})} required />
                                <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition">
                                    {isRegister ? 'Create System Account' : 'Secure Login'}
                                </button>
                            </form>
                            <p className="mt-4 text-center text-sm text-slate-400 cursor-pointer hover:text-blue-400" onClick={() => setIsRegister(!isRegister)}>
                                {isRegister ? 'Already Registered? Login' : 'New Business? Create Live Account'}
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-950">
                    {/* Mobile Friendly Dashboard Header/Sidebar */}
                    <aside className="w-full md:w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col justify-between">
                        <div>
                            <div className="mb-8">
                                <h1 className="text-xl font-bold text-blue-500">{user.companyName}</h1>
                                <p className="text-xs text-slate-500">ID: {user.companyCode} ({user.role})</p>
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => setView('dashboard')} className={`w-full text-left p-3 rounded-xl ${view === 'dashboard' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>📊 Dashboard</button>
                                <button onClick={() => setView('orders')} className={`w-full text-left p-3 rounded-xl ${view === 'orders' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>📦 Orders ({myOrders.length})</button>
                                <button onClick={() => setView('products')} className={`w-full text-left p-3 rounded-xl ${view === 'products' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>🛒 Inventory Stock</button>
                                <button onClick={() => setView('customers')} className={`w-full text-left p-3 rounded-xl ${view === 'customers' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>👥 Customers</button>
                                {user.role === 'ADMIN' && <button onClick={() => setView('employees')} className={`w-full text-left p-3 rounded-xl ${view === 'employees' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>👔 Employees</button>}
                            </nav>
                        </div>
                        <button onClick={logout} className="mt-8 bg-red-600/20 text-red-400 p-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">Logout</button>
                    </aside>

                    {/* Main Interface Window */}
                    <main className="flex-1 p-6 md:p-10 overflow-x-hidden">
                        
                        {view === 'dashboard' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-3xl font-bold">Analytics Engine</h2>
                                    <button onClick={exportExcel} className="bg-emerald-600 text-white font-semibold px-4 py-2 rounded-xl text-sm shadow">📊 Export Financial Report (Excel)</button>
                                </div>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm">
                                        <p className="text-slate-400 text-sm">Approved Net Revenue</p>
                                        <h3 className="text-3xl font-bold text-emerald-400 mt-2">Rs. {myOrders.reduce((sum, o) => o.status === 'Approved' ? sum + o.total_amount : sum, 0).toFixed(2)}</h3>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm">
                                        <p className="text-slate-400 text-sm">Pending Orders Balance</p>
                                        <h3 className="text-3xl font-bold text-amber-400 mt-2">Rs. {myOrders.reduce((sum, o) => o.status === 'Pending' ? sum + o.total_amount : sum, 0).toFixed(2)}</h3>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm">
                                        <p className="text-slate-400 text-sm">Low Stock Alert Items</p>
                                        <h3 className="text-3xl font-bold text-red-400 mt-2">{myProducts.filter(p => p.quantity <= p.lowStock).length}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'orders' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Orders Log</h2>
                                    <button onClick={() => setView('add_order')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Add Order</button>
                                </div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-800 border-b border-slate-700">
                                            <tr>
                                                <th className="p-4">Order Code</th>
                                                <th className="p-4">Customer</th>
                                                <th className="p-4">Product Name</th>
                                                <th className="p-4">Total Amount</th>
                                                <th className="p-4">Status</th>
                                                {user.role === 'ADMIN' && <th className="p-4">Workflow Actions</th>}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {myOrders.map(o => (
                                                <tr key={o.id} className="border-b border-slate-800 hover:bg-slate-800/50">
                                                    <td className="p-4 text-blue-400 font-mono">{o.order_number}</td>
                                                    <td className="p-4">{o.customer_name}</td>
                                                    <td className="p-4">{o.item_name} (x{o.quantity})</td>
                                                    <td className="p-4 text-emerald-400 font-bold">Rs. {o.total_amount.toFixed(2)}</td>
                                                    <td className="p-4">
                                                        <span className={`px-2 py-1 rounded text-xs font-bold ${o.status === 'Approved' ? 'bg-green-500/10 text-green-400' : o.status === 'Pending' ? 'bg-amber-500/10 text-amber-400' : 'bg-red-500/10 text-red-400'}`}>{o.status}</span>
                                                    </td>
                                                    {user.role === 'ADMIN' && o.status === 'Pending' && (
                                                        <td className="p-4 space-x-2">
                                                            <button onClick={() => updateStatus(o.id, 'Approved')} className="bg-emerald-600 text-xs px-2 py-1 rounded">Approve</button>
                                                            <button onClick={() => updateStatus(o.id, 'Rejected')} className="bg-red-600 text-xs px-2 py-1 rounded">Reject</button>
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {view === 'add_order' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">Create New Order Invoice</h2>
                                <form onSubmit={handleCreateOrder} className="space-y-4">
                                    <select className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setOrderForm({...orderForm, customerId: e.target.value})} required>
                                        <option value="">-- Select Customer --</option>
                                        {myCustomers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                    </select>
                                    <select className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setOrderForm({...orderForm, itemId: e.target.value})} required>
                                        <option value="">-- Select Item From Stock --</option>
                                        {myProducts.map(p => <option key={p.id} value={p.id}>{p.item_name} (Stock: {p.quantity}) - Rs. {p.selling_price}</option>)}
                                    </select>
                                    <input type="number" min="1" placeholder="Quantity" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setOrderForm({...orderForm, quantity: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Launch Order</button>
                                </form>
                            </div>
                        )}

                        {view === 'products' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Inventory Engine</h2>
                                    {user.role === 'ADMIN' && <button onClick={() => setView('add_product')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Add Product</button>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {myProducts.map(p => (
                                        <div key={p.id} className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                            <div className="flex justify-between items-start">
                                                <h4 className="text-lg font-bold">{p.item_name}</h4>
                                                <span className="text-xs font-mono text-slate-500">{p.item_code}</span>
                                            </div>
                                            <div className="mt-4 flex justify-between">
                                                <div>
                                                    <p className="text-xs text-slate-400">Selling Price</p>
                                                    <p className="font-bold text-emerald-400">Rs. {parseFloat(p.selling_price).toFixed(2)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-xs text-slate-400">Stock Status</p>
                                                    <p className={`font-bold ${p.quantity <= p.lowStock ? 'text-red-400 animate-pulse' : 'text-slate-200'}`}>{p.quantity} Units left</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'add_product' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">Add Product to Global Stock</h2>
                                <form onSubmit={handleAddProduct} className="space-y-4">
                                    <input type="text" placeholder="Item Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setProdForm({...prodForm, itemName: e.target.value})} required />
                                    <input type="text" placeholder="Item Code" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setProdForm({...prodForm, itemCode: e.target.value})} required />
                                    <input type="number" placeholder="Cost Price (Rs.)" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setProdForm({...prodForm, costPrice: e.target.value})} required />
                                    <input type="number" placeholder="Selling Price (Rs.)" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setProdForm({...prodForm, sellingPrice: e.target.value})} required />
                                    <input type="number" placeholder="Initial Stock Quantity" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setProdForm({...prodForm, quantity: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Register Product</button>
                                </form>
                            </div>
                        )}

                        {view === 'customers' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Client Directory</h2>
                                    <button onClick={() => setView('add_customer')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Add Customer</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {myCustomers.map(c => (
                                        <div key={c.id} className="bg-slate-900 p-6 rounded-2xl border border-slate-800 flex justify-between items-center">
                                            <div>
                                                <h3 className="text-xl font-bold text-slate-200">{c.name}</h3>
                                                <p className="text-sm text-slate-400">{c.phone} | {c.address}</p>
                                            </div>
                                            <div className="text-right">
                                                <span className="text-xs text-slate-500 block">Outstanding</span>
                                                <span className="text-md font-bold text-amber-500">Rs. {parseFloat(c.outstanding).toFixed(2)}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'add_customer' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">Add Profile to Customer Base</h2>
                                <form onSubmit={handleAddCustomer} className="space-y-4">
                                    <input type="text" placeholder="Customer Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setCustForm({...custForm, name: e.target.value})} required />
                                    <input type="text" placeholder="Phone Number" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setCustForm({...custForm, phone: e.target.value})} required />
                                    <input type="text" placeholder="Address" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setCustForm({...custForm, address: e.target.value})} />
                                    <input type="number" placeholder="Outstanding Balance If Any (Rs.)" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setCustForm({...custForm, outstanding: e.target.value})} />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Save Customer Profile</button>
                                </form>
                            </div>
                        )}

                        {view === 'employees' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">Staff Control Panel</h2>
                                    <button onClick={() => setView('add_employee')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Create Employee Portal</button>
                                </div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 p-6">
                                    {myEmployees.map(emp => (
                                        <div key={emp.id} className="p-3 border-b border-slate-800 flex justify-between">
                                            <span>👤 {emp.fullName}</span>
                                            <span className="text-slate-500">Username: <b className="text-slate-300">{emp.username}</b></span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'add_employee' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">Create Employee Account</h2>
                                <form onSubmit={handleAddEmployee} className="space-y-4">
                                    <input type="text" placeholder="Employee Full Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setEmpForm({...empForm, fullName: e.target.value})} required />
                                    <input type="text" placeholder="Assigned Username" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setEmpForm({...empForm, username: e.target.value})} required />
                                    <input type="password" placeholder="Temporary Password" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl" onChange={e => setEmpForm({...empForm, password: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Generate Employee Profile</button>
                                </form>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
