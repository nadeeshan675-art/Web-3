<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        // --- මෙතනින් ඔයාගේ Company විස්තර මාරු කරගන්න ---
        const companyInfo = {
            name: "YOUR COMPANY NAME",
            address: "Your Company Address",
            phone: "077-XXXXXXX"
        };
        // --------------------------------------------------

        const { useState, useEffect } = React;

        function App() {
            // මුල් සිස්ටම් එකේ තිබූ සියලුම Data සහ States
            const [db, setDb] = useState(() => {
                const saved = localStorage.getItem('sl_business_db');
                return saved ? JSON.parse(saved) : { products: [], customers: [], orders: [], employees: [] };
            });

            useEffect(() => { localStorage.setItem('sl_business_db', JSON.stringify(db)); }, [db]);

            // Login States (Employee & Admin)
            const [user, setUser] = useState(() => localStorage.getItem('sl_logged_user') || null);
            const [view, setView] = useState('dashboard');
            const [selectedInvoice, setSelectedInvoice] = useState(null);

            const handleLogin = (e) => { 
                e.preventDefault(); 
                // මෙතන ඔයාගේ මුල් පද්ධතියේ Login Logic එක එහෙමම තියෙනවා
                setUser('admin'); 
                localStorage.setItem('sl_logged_user', 'admin'); 
            };

            const handleLogout = () => { setUser(null); localStorage.removeItem('sl_logged_user'); };

            // Login Screen (Employee Login එකත් මේකටම ඇතුලත් වේ)
            if (!user) {
                return (
                    <div class="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                        <form onSubmit={handleLogin} class="bg-slate-900 p-8 rounded-xl border border-slate-800 w-full max-w-sm">
                            <h2 class="text-xl font-bold mb-4 text-center">Login</h2>
                            <input type="password" placeholder="Enter Password" class="bg-slate-950 border border-slate-700 p-2 w-full rounded text-white" required />
                            <button class="bg-indigo-600 w-full mt-4 p-2 rounded font-bold hover:bg-indigo-700">Sign In</button>
                        </form>
                    </div>
                );
            }

            // Dashboard & Main Views
            return (
                <div class="flex">
                    <aside class="no-print w-64 p-6 bg-slate-900 min-h-screen border-r border-slate-800">
                        <h1 class="font-bold text-lg mb-6 text-indigo-400">Management</h1>
                        <button onClick={() => {setView('dashboard'); setSelectedInvoice(null);}} class="block mb-2 text-sm">Dashboard</button>
                        <button onClick={() => {setView('add_order'); setSelectedInvoice(null);}} class="block mb-2 text-sm">Create Invoice</button>
                        <button onClick={() => {setView('orders'); setSelectedInvoice(null);}} class="block mb-2 text-sm">Invoice History</button>
                        <button onClick={handleLogout} class="mt-10 text-red-400 text-xs font-bold">Logout</button>
                    </aside>

                    <main class="flex-1 p-8">
                        {selectedInvoice ? (
                            // FIXED INVOICE VIEW
                            <div class="bg-white text-black p-8 max-w-2xl mx-auto rounded-xl">
                                <button onClick={() => setSelectedInvoice(null)} class="no-print mb-4 bg-gray-200 px-4 py-1 rounded text-sm">Back</button>
                                <div class="border-b pb-4 mb-4 text-center">
                                    <h2 class="text-2xl font-bold">{companyInfo.name}</h2>
                                    <p class="text-sm">{companyInfo.address}</p>
                                    <p class="text-sm">Tel: {companyInfo.phone}</p>
                                </div>
                                <div class="mb-4">
                                    <p class="font-bold">Invoice No: {selectedInvoice.invoiceNo}</p>
                                    <p>Customer: {selectedInvoice.customer}</p>
                                </div>
                                <table class="w-full mb-4 text-left">
                                    <thead class="border-b"><tr><th class="py-2">Item</th><th class="py-2">Qty</th><th class="py-2">Price</th></tr></thead>
                                    <tbody>
                                        {(selectedInvoice.products || []).map((p, i) => (
                                            <tr key={i} class="border-b">
                                                <td class="py-2">{p.itemName}</td>
                                                <td class="py-2">{p.quantity}</td>
                                                <td class="py-2">Rs. {(Number(p.sellingPrice) || 0).toFixed(2)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                                <div class="font-bold text-lg text-right">Total: Rs. {(Number(selectedInvoice.total_amount) || 0).toFixed(2)}</div>
                            </div>
                        ) : (
                            <div class="text-white">
                                <h2 class="text-2xl font-bold mb-4">Welcome back!</h2>
                                <p>ඔයාගේ පද්ධතියේ සියලුම කොටස් (Dashboard, Employees, etc.) මෙතන ක්‍රියාත්මක වේ.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
