<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SL Business Pro - Corporate Enterprise v6</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            #printable-invoice { 
                position: absolute; left: 0; top: 0; width: 100%; 
                box-shadow: none !important; border: none !important; padding: 0 !important; 
                color: black !important; background: white !important;
            }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const initDB = () => {
            const data = localStorage.getItem('sl_biz_db');
            if (data) return JSON.parse(data);
            return { companies: [], employees: [], customers: [], products: [], orders: [] };
        };

        const saveDB = (dbData) => {
            localStorage.setItem('sl_biz_db', JSON.stringify(dbData));
        };

        // Helper function to convert number to words for LKR
        function numberToWords(num) {
            const a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
            const b = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
            
            if ((num = num.toString()).length > 9) return 'overflow';
            let n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
            if (!n) return ''; 
            let str = '';
            str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
            str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
            str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
            str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
            str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) : '';
            return str.trim();
        }

        function formatAmountInWords(amount) {
            const parts = amount.toFixed(2).split('.');
            const rupees = parseInt(parts[0]);
            const cents = parseInt(parts[1]);
            
            let words = numberToWords(rupees) + " Rupees";
            if (cents > 0) {
                words += " and " + numberToWords(cents) + " Cents";
            }
            return words + " Only";
        }

        function App() {
            const [db, setDb] = useState(initDB());
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('sl_user')) || null);
            const [isRegister, setIsRegister] = useState(false);
            const [view, setView] = useState('dashboard');
            const [selectedInvoice, setSelectedInvoice] = useState(null);
            
            const [cart, setCart] = useState([]);
            const [selectedCustomerId, setSelectedCustomerId] = useState('');
            const [additionalDiscountPercent, setAdditionalDiscountPercent] = useState(0);

            const [authForm, setAuthForm] = useState({ username: '', password: '', fullName: '', companyName: '', phone: '', email: '' });
            const [custForm, setCustForm] = useState({ name: '', phone: '', email: '', address: '', outstanding: 0 });
            const [prodForm, setProdForm] = useState({ itemName: '', itemCode: '', costPrice: 0, sellingPrice: 0, quantity: 0, lowStock: 5 });
            const [orderForm, setOrderForm] = useState({ itemId: '', quantity: 1, discountPercent: 0 });
            const [empForm, setEmpForm] = useState({ fullName: '', username: '', password: '' });

            const handleRegister = (e) => {
                e.preventDefault();
                const companyCode = 'SLB' + Math.floor(1000 + Math.random() * 9000);
                const newCompany = {
                    company_code: companyCode,
                    full_name: authForm.fullName,
                    company_name: authForm.companyName,
                    phone: authForm.phone,
                    email: authForm.email,
                    username: authForm.username,
                    password: authForm.password
                };
                const updatedDB = { ...db, companies: [...db.companies, newCompany] };
                setDb(updatedDB); saveDB(updatedDB);
                alert(`🎉 ලියාපදිංචිය සාර්ථකයි!\nCompany Code: ${companyCode}`);
                setIsRegister(false);
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const admin = db.companies.find(c => c.username === authForm.username && c.password === authForm.password);
                if (admin) {
                    const sessionData = { role: 'ADMIN', name: admin.full_name, companyCode: admin.company_code, companyName: admin.company_name, phone: admin.phone, email: admin.email };
                    setUser(sessionData);
                    localStorage.setItem('sl_user', JSON.stringify(sessionData));
                    return;
                }
                
                const emp = db.employees.find(e => e.username === authForm.username && e.password === authForm.password);
                if (emp) {
                    const sessionData = { role: 'EMPLOYEE', name: emp.fullName, companyCode: emp.company_code, companyName: 'Staff Portal' };
                    setUser(sessionData);
                    localStorage.setItem('sl_user', JSON.stringify(sessionData));
                    return;
                }
                alert('පරිශීලක නාමය හෝ රහස්පදය වැරදියි!');
            };

            const handleAddCustomer = (e) => {
                e.preventDefault();
                if (user.role !== 'ADMIN') return;
                const newCust = { id: Date.now(), company_code: user.companyCode, ...custForm };
                const updatedDB = { ...db, customers: [...db.customers, newCust] };
                setDb(updatedDB); saveDB(updatedDB);
                alert('පාරිභෝගිකයා සාර්ථකව ඇතුළත් කළා!');
                setView('customers');
            };

            const handleAddProduct = (e) => {
                e.preventDefault();
                if (user.role !== 'ADMIN') return;
                const newProd = { id: Date.now(), company_code: user.companyCode, ...prodForm };
                const updatedDB = { ...db, products: [...db.products, newProd] };
                setDb(updatedDB); saveDB(updatedDB);
                alert('භාණ්ඩය සාර්ථකව ඇතුළත් කළා!');
                setView('products');
            };

            const addItemToCart = (e) => {
                e.preventDefault();
                if (!orderForm.itemId) { alert('කරුණාකර භාණ්ඩයක් තෝරන්න.'); return; }
                const prod = db.products.find(p => p.id == orderForm.itemId);
                
                if (!prod || prod.quantity < orderForm.quantity) {
                    alert('ගබඩාවේ පවතින ප්‍රමාණයට වඩා ඇණවුම් කළ නොහැක!');
                    return;
                }

                const grossAmount = orderForm.quantity * prod.sellingPrice;
                const discount = (grossAmount * (orderForm.discountPercent || 0)) / 100;
                const finalAmount = grossAmount - discount;
                const costTotal = orderForm.quantity * prod.costPrice;
                const calculatedProfit = finalAmount - costTotal;

                const cartItem = {
                    item_id: prod.id,
                    item_name: prod.itemName,
                    item_code: prod.itemCode,
                    quantity: parseInt(orderForm.quantity),
                    selling_price: parseFloat(prod.sellingPrice),
                    discount_rate: orderForm.discountPercent,
                    discount_amount: discount,
                    total_amount: finalAmount,
                    profit: calculatedProfit
                };

                setCart([...cart, cartItem]);
                setOrderForm({ itemId: '', quantity: 1, discountPercent: 0 });
            };

            const submitCompleteOrder = () => {
                if (!selectedCustomerId) { alert('කරුණාකර පාරිභෝගිකයා තෝරන්න!'); return; }
                if (cart.length === 0) { alert('කරුණාකර අවම වශයෙන් එක් භාණ්ඩයක්වත් එකතු කරන්න!'); return; }

                const cust = db.customers.find(c => c.id == selectedCustomerId);
                const subTotal = cart.reduce((sum, item) => sum + item.total_amount, 0);
                const additionalDiscountAmt = (subTotal * (additionalDiscountPercent || 0)) / 100;
                const finalInvoiceAmount = subTotal - additionalDiscountAmt;
                const totalInvoiceProfit = cart.reduce((sum, item) => sum + item.profit, 0) - additionalDiscountAmt;
                const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);

                const newOrderInvoice = {
                    id: Date.now(),
                    company_code: user.companyCode,
                    order_number: 'INV-' + Math.floor(100000 + Math.random() * 900000),
                    customer_name: cust.name,
                    customer_phone: cust.phone,
                    customer_address: cust.address || 'N/A',
                    items: cart,
                    sub_total: subTotal,
                    additional_discount_rate: additionalDiscountPercent,
                    additional_discount_amount: additionalDiscountAmt,
                    total_amount: finalInvoiceAmount,
                    total_qty: totalQty,
                    profit: totalInvoiceProfit,
                    employee_name: user.name,
                    status: 'Pending',
                    notified: false,
                    date: new Date().toLocaleDateString('en-GB')
                };

                const updatedDB = { ...db, orders: [...db.orders, newOrderInvoice] };
                setDb(updatedDB); saveDB(updatedDB);
                
                alert('සම්පූර්ණ ඇණවුම සාර්ථකව Admin වෙත යොමු කළා!');
                setCart([]);
                setSelectedCustomerId('');
                setAdditionalDiscountPercent(0);
                setView('orders');
            };

            const handleAddEmployee = (e) => {
                e.preventDefault();
                if (user.role !== 'ADMIN') return;
                const newEmp = { id: Date.now(), company_code: user.companyCode, ...empForm };
                const updatedDB = { ...db, employees: [...db.employees, newEmp] };
                setDb(updatedDB); saveDB(updatedDB);
                alert(`සේවක ගිණුම සාර්ථකව සෑදුවා!`);
                setView('employees');
            };

            const updateStatus = (orderId, newStatus) => {
                if (user.role !== 'ADMIN') return;
                const updatedOrders = db.orders.map(o => {
                    if (o.id === orderId) {
                        if (newStatus === 'Approved') {
                            o.items.forEach(cartItem => {
                                db.products = db.products.map(p => {
                                    if (p.id === cartItem.item_id) return { ...p, quantity: p.quantity - cartItem.quantity };
                                    return p;
                                });
                            });
                        }
                        return { ...o, status: newStatus, notified: false };
                    }
                    return o;
                });
                const updatedDB = { ...db, orders: updatedOrders };
                setDb(updatedDB); saveDB(updatedDB);
            };

            const dismissNotification = (orderId) => {
                const updatedOrders = db.orders.map(o => {
                    if (o.id === orderId) return { ...o, notified: true };
                    return o;
                });
                const updatedDB = { ...db, orders: updatedOrders };
                setDb(updatedDB); saveDB(updatedDB);
            };

            const logout = () => {
                localStorage.removeItem('sl_user');
                setUser(null);
            };

            const myCustomers = db.customers.filter(c => c.company_code === user?.companyCode);
            const myProducts = db.products.filter(p => p.company_code === user?.companyCode);
            const myOrders = db.orders.filter(o => o.company_code === user?.companyCode);
            const myEmployees = db.employees.filter(e => e.company_code === user?.companyCode);
            const currentCompany = db.companies.find(c => c.company_code === user?.companyCode);

            const myNotifications = myOrders.filter(o => o.employee_name === user?.name && o.status !== 'Pending' && o.notified === false);
            const totalRevenue = myOrders.reduce((sum, o) => o.status === 'Approved' ? sum + o.total_amount : sum, 0);
            const totalProfit = myOrders.reduce((sum, o) => o.status === 'Approved' ? sum + o.profit : sum, 0);

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4">
                        <div className="bg-slate-900 p-8 rounded-3xl shadow-2xl w-full max-w-md border border-slate-800">
                            <h2 className="text-3xl font-bold text-center text-blue-500 mb-6">{isRegister ? 'Business Registration' : 'SL Business Pro'}</h2>
                            <form onSubmit={isRegister ? handleRegister : handleLogin} className="space-y-4">
                                {isRegister && (
                                    <>
                                        <input type="text" placeholder="Full Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, fullName: e.target.value})} required />
                                        <input type="text" placeholder="Business Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, companyName: e.target.value})} required />
                                        <input type="text" placeholder="Phone Number" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, phone: e.target.value})} />
                                        <input type="email" placeholder="Email Address" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, email: e.target.value})} />
                                    </>
                                )}
                                <input type="text" placeholder="Username" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, username: e.target.value})} required />
                                <input type="password" placeholder="Password" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setAuthForm({...authForm, password: e.target.value})} required />
                                <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">
                                    {isRegister ? 'ලියාපදිංචි වන්න' : 'ඇතුළු වන්න (Login)'}
                                </button>
                            </form>
                            <p className="mt-4 text-center text-sm text-slate-400 cursor-pointer" onClick={() => setIsRegister(!isRegister)}>
                                {isRegister ? 'ගිණුමක් තිබේද? Login' : 'නව ව්‍යාපාරයක්ද? Register'}
                            </p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-950">
                    <aside className="no-print w-full md:w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col justify-between">
                        <div>
                            <div className="mb-8">
                                <h1 className="text-xl font-bold text-blue-500">{currentCompany ? currentCompany.company_name : user.companyName}</h1>
                                <p className="text-xs text-slate-500">Code: {user.companyCode} | Role: {user.role}</p>
                                <p className="text-xs text-slate-300 mt-1">User: {user.name}</p>
                            </div>
                            <nav className="space-y-2">
                                <button onClick={() => { setView('dashboard'); setSelectedInvoice(null); }} className={`w-full text-left p-3 rounded-xl ${view === 'dashboard' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>📊 Dashboard</button>
                                <button onClick={() => { setView('orders'); setSelectedInvoice(null); }} className={`w-full text-left p-3 rounded-xl ${view === 'orders' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>📦 Invoices & Orders</button>
                                <button onClick={() => { setView('products'); setSelectedInvoice(null); }} className={`w-full text-left p-3 rounded-xl ${view === 'products' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>🛒 Stock View</button>
                                <button onClick={() => { setView('customers'); setSelectedInvoice(null); }} className={`w-full text-left p-3 rounded-xl ${view === 'customers' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>👥 Customers List</button>
                                {user.role === 'ADMIN' && (
                                    <button onClick={() => { setView('employees'); setSelectedInvoice(null); }} className={`w-full text-left p-3 rounded-xl ${view === 'employees' ? 'bg-blue-600 font-bold' : 'hover:bg-slate-800'}`}>👔 Staff Management</button>
                                )}
                            </nav>
                        </div>
                        <button onClick={logout} className="mt-8 bg-red-600/20 text-red-400 p-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition">Logout</button>
                    </aside>

                    <main className="flex-1 p-4 md:p-8 overflow-x-hidden">
                        
                        {user.role === 'EMPLOYEE' && myNotifications.length > 0 && (
                            <div className="mb-6 space-y-2 no-print">
                                {myNotifications.map(n => (
                                    <div key={n.id} className="bg-emerald-600 text-white p-4 rounded-xl shadow flex justify-between items-center">
                                        <span>🔔 ඔබේ ඇණවුම <b>{n.order_number}</b> (Rs. {n.total_amount.toFixed(2)}) Admin විසින් <b>{n.status}</b> කරන ලදී!</span>
                                        <button onClick={() => dismissNotification(n.id)} className="bg-emerald-800 text-xs px-3 py-1 rounded-lg">Okay</button>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* HIGH QUALITY CORPORATE A4 PRINT INVOICE LAYOUT MATCHING UPLOADED IMAGE */}
                        {selectedInvoice && (
                            <div className="max-w-4xl mx-auto bg-slate-900 p-4 rounded-2xl border border-slate-800 no-print mb-6 flex justify-between items-center">
                                <span className="text-sm text-slate-400">Corporate Print View Mode active for {selectedInvoice.order_number}</span>
                                <div className="space-x-2">
                                    <button onClick={() => window.print()} className="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow hover:bg-blue-700 transition">🖨️ Print Invoice</button>
                                    <button onClick={() => setSelectedInvoice(null)} className="bg-slate-700 text-slate-200 px-4 py-2 rounded-xl hover:bg-slate-600">Back</button>
                                </div>
                            </div>
                        )}

                        {selectedInvoice && (
                            <div id="printable-invoice" className="bg-white text-black p-6 mx-auto border-2 border-black max-w-[8.5in] min-h-[11in] font-serif text-[12px] leading-tight shadow-xl">
                                
                                {/* Company Header block matching corporate style */}
                                <div className="text-center border-b-2 border-black pb-2 mb-2 relative">
                                    <h1 className="text-2xl font-black tracking-wide uppercase font-sans">{currentCompany ? currentCompany.company_name : "Ceylon Dubhe (Pvt) Ltd"}</h1>
                                    <p className="text-[11px] font-sans">
                                        {currentCompany?.address || "No. 68 1/1, Parakrama Mawatha, Peliyagoda"} &nbsp;|&nbsp; 
                                        TP: {currentCompany?.phone || "011 470 1217"} &nbsp;|&nbsp; 
                                        E-mail: {currentCompany?.email || "info@dubhe.lk"} &nbsp;|&nbsp; 
                                        Web: www.dubhe.com
                                    </p>
                                    <span className="absolute right-2 top-0 border border-black px-2 py-0.5 text-xs font-black tracking-widest font-sans">INVOICE</span>
                                </div>

                                {/* Metadata Grid: Source, Customer details vs Invoice parameters */}
                                <div className="grid grid-cols-12 border-b-2 border-black mb-3">
                                    <div className="col-span-6 border-r-2 border-black p-2 font-sans text-[11px]">
                                        <div><span className="font-bold italic">SOURCE MC:</span> &nbsp; <span className="font-bold">Main Store / W/H Depot</span></div>
                                        <div className="mt-1 font-bold italic border-b border-gray-300 pb-0.5">Customer Details :</div>
                                        <div className="mt-1 font-black uppercase text-[12px]">{selectedInvoice.customer_name}</div>
                                        <div className="text-gray-700 font-medium whitespace-pre-wrap">{selectedInvoice.customer_address}</div>
                                        <div className="mt-1 font-bold">{selectedInvoice.customer_phone}</div>
                                    </div>
                                    <div className="col-span-6 p-2 font-sans text-[11px] space-y-1">
                                        <div className="flex"><span className="w-28 font-bold">INV.No.</span><span>: {selectedInvoice.order_number}</span></div>
                                        <div className="flex"><span className="w-28 font-bold">Date</span><span>: {selectedInvoice.date}</span></div>
                                        <div className="flex"><span className="w-28 font-bold">PO No</span><span>: {selectedInvoice.id.toString().substr(-5)}</span></div>
                                        <div className="flex"><span className="w-28 font-bold">Sales Person</span><span>: {selectedInvoice.employee_name.toUpperCase()}</span></div>
                                        <div className="flex"><span className="w-28 font-bold">Payment Term</span><span>: CREDIT</span></div>
                                    </div>
                                </div>

                                {/* Main Detailed Table */}
                                <table className="w-full text-left border-collapse border border-black font-sans text-[11px]">
                                    <thead>
                                        <tr className="border-b border-black bg-gray-100 font-bold text-center">
                                            <th className="border-r border-black p-1 w-[4%]">S.N.</th>
                                            <th className="border-r border-black p-1 text-left w-[45%]">Description of Goods</th>
                                            <th className="border-r border-black p-1 w-[12%]">Code</th>
                                            <th className="border-r border-black p-1 w-[8%]">Qty.</th>
                                            <th className="border-r border-black p-1 w-[6%]">Unit</th>
                                            <th className="border-r border-black p-1 w-[10%] text-right">List Price</th>
                                            <th className="border-r border-black p-1 w-[10%] text-right">Discount</th>
                                            <th className="border-r border-black p-1 w-[10%] text-right">Price</th>
                                            <th className="p-1 text-right w-[12%]">Amount(Rs.)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {selectedInvoice.items && selectedInvoice.items.map((item, idx) => {
                                            const listPrice = item.selling_price;
                                            const discPercent = item.discount_rate || 0;
                                            const itemFinalPrice = listPrice - (listPrice * discPercent / 100);
                                            return (
                                                <tr key={idx} className="border-b border-black hover:bg-gray-50 align-top text-center">
                                                    <td className="border-r border-black p-1.5">{idx + 1}.</td>
                                                    <td className="border-r border-black p-1.5 text-left font-medium">{item.item_name}</td>
                                                    <td className="border-r border-black p-1.5 font-mono">{item.item_code}</td>
                                                    <td className="border-r border-black p-1.5 font-bold">{item.quantity.toFixed(2)}</td>
                                                    <td className="border-r border-black p-1.5">Pcs.</td>
                                                    <td className="border-r border-black p-1.5 text-right font-mono">{listPrice.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                                    <td className="border-r border-black p-1.5 text-right font-mono">{discPercent.toFixed(2)} %</td>
                                                    <td className="border-r border-black p-1.5 text-right font-mono">{itemFinalPrice.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                                    <td className="p-1.5 text-right font-bold font-mono">{item.total_amount.toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                                                </tr>
                                            );
                                        })}
                                        {/* Blank Spacer Rows to fill height like standard commercial bills */}
                                        {[...Array(Math.max(0, 6 - (selectedInvoice.items?.length || 0)))].map((_, i) => (
                                            <tr key={i} className="border-b border-black h-8 text-center opacity-20">
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="border-r border-black p-1"></td>
                                                <td className="p-1"></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>

                                {/* Footer calculations and summary matching image */}
                                <div className="mt-4 font-sans text-[11px]">
                                    {selectedInvoice.additional_discount_amount > 0 && (
                                        <div className="flex justify-end border border-black border-b-0">
                                            <div className="w-[88%] text-right p-1.5 border-r border-black font-italic italic">
                                                Less : Additional Discount @ {selectedInvoice.additional_discount_rate?.toFixed(2)} %
                                            </div>
                                            <div className="w-[12%] text-right p-1.5 font-mono">
                                                {selectedInvoice.additional_discount_amount.toLocaleString('en-US', {minimumFractionDigits: 2})}
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex justify-between items-center border border-black bg-gray-50">
                                        <div className="w-[50%] p-2 font-black text-xs uppercase tracking-wider text-left border-r border-black">
                                            Grand Total
                                        </div>
                                        <div className="w-[38%] p-2 font-black text-xs text-center border-r border-black">
                                            {(selectedInvoice.total_qty || selectedInvoice.quantity || 0).toFixed(2)} Pcs.
                                        </div>
                                        <div className="w-[12%] p-2 font-black text-sm text-right font-mono">
                                            {selectedInvoice.total_amount.toLocaleString('en-US', {minimumFractionDigits: 2})}
                                        </div>
                                    </div>

                                    <div className="mt-2 p-2 border border-black rounded bg-gray-50/50 font-medium">
                                        <span className="font-bold">LKR:</span> &nbsp; 
                                        <span className="italic font-serif text-[12px]">
                                            {formatAmountInWords(selectedInvoice.total_amount)}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* REST OF DASHBOARD COMPONENTS */}
                        {!selectedInvoice && view === 'dashboard' && (
                            <div>
                                <h2 className="text-3xl font-bold mb-6">Business Dashboard ({user.role})</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                        <p className="text-slate-400 text-sm">Approved Revenue</p>
                                        <h3 className="text-3xl font-bold text-emerald-400 mt-2">Rs. {totalRevenue.toFixed(2)}</h3>
                                    </div>
                                    {user.role === 'ADMIN' && (
                                        <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                            <p className="text-slate-400 text-sm">Net Profit Summary</p>
                                            <h3 className="text-3xl font-bold text-blue-400 mt-2">Rs. {totalProfit.toFixed(2)}</h3>
                                        </div>
                                    )}
                                    <div className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                        <p className="text-slate-400 text-sm">Low Stock Alert</p>
                                        <h3 className="text-3xl font-bold text-red-400 mt-2">{myProducts.filter(p => p.quantity <= p.lowStock).length}</h3>
                                    </div>
                                </div>
                            </div>
                        )}

                        {!selectedInvoice && view === 'orders' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">ඇණවුම් ලේඛනය (Orders Log)</h2>
                                    <button onClick={() => { setView('add_order'); setCart([]); }} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Create Multi-Item Order</button>
                                </div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-800 border-b border-slate-700">
                                            <tr>
                                                <th className="p-4">Invoice No</th>
                                                <th className="p-4">Customer</th>
                                                <th className="p-4">Items Qty</th>
                                                <th className="p-4">Total Value</th>
                                                <th className="p-4">Billed By</th>
                                                <th className="p-4">Status</th>
                                                <th className="p-4">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {myOrders.map(o => (
                                                <tr key={o.id} className="border-b border-slate-800 hover:bg-slate-800/50">
                                                    <td className="p-4 font-mono text-blue-400">{o.order_number}</td>
                                                    <td className="p-4">{o.customer_name}</td>
                                                    <td className="p-4 text-center font-bold text-slate-300">{o.items ? o.items.length : 1}</td>
                                                    <td className="p-4 text-emerald-400 font-bold">Rs. {o.total_amount.toFixed(2)}</td>
                                                    <td className="p-4 text-slate-400 text-sm">{o.employee_name}</td>
                                                    <td className="p-4">
                                                        <span className={`px-2 py-1 rounded text-xs font-bold ${o.status === 'Approved' ? 'bg-green-500/10 text-green-400' : 'bg-amber-500/10 text-amber-400'}`}>{o.status}</span>
                                                    </td>
                                                    <td className="p-4 space-x-2">
                                                        <button onClick={() => setSelectedInvoice(o)} className="bg-slate-700 px-2 py-1 rounded text-xs text-white">🖨️ View & Print</button>
                                                        {user.role === 'ADMIN' && o.status === 'Pending' && (
                                                            <button onClick={() => updateStatus(o.id, 'Approved')} className="bg-emerald-600 text-xs px-2 py-1 rounded text-white">Approve</button>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {!selectedInvoice && view === 'add_order' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-1 bg-slate-900 p-6 rounded-2xl border border-slate-800 h-fit">
                                    <h2 className="text-xl font-bold mb-4 text-blue-400">භාණ්ඩයක් එකතු කරන්න</h2>
                                    
                                    <label className="text-xs text-slate-400 block mb-1 font-semibold">1. පාරිභෝගිකයා තෝරන්න:</label>
                                    <select disabled={cart.length > 0} className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white mb-4 disabled:opacity-50" value={selectedCustomerId} onChange={e => setSelectedCustomerId(e.target.value)} required>
                                        <option value="">-- Select Customer --</option>
                                        {myCustomers.map(c => <option key={c.id} value={c.id}>{c.name} ({c.phone})</option>)}
                                    </select>

                                    <form onSubmit={addItemToCart} className="space-y-4 pt-2 border-t border-slate-800">
                                        <label className="text-xs text-slate-400 block mb-1 font-semibold">2. භාණ්ඩය තෝරන්න:</label>
                                        <select className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" value={orderForm.itemId} onChange={e => setOrderForm({...orderForm, itemId: e.target.value})} required>
                                            <option value="">-- Select Item --</option>
                                            {myProducts.map(p => <option key={p.id} value={p.id}>{p.itemName} (Stock: {p.quantity})</option>)}
                                        </select>
                                        
                                        <div>
                                            <label className="text-xs text-slate-400 block mb-1 font-semibold">ප්‍රමාණය (Qty):</label>
                                            <input type="number" min="1" value={orderForm.quantity} className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setOrderForm({...orderForm, quantity: e.target.value})} required />
                                        </div>

                                        <div>
                                            <label className="text-xs text-slate-400 block mb-1 font-semibold">තනි භාණ්ඩයට වට්ටම් (Item Discount %):</label>
                                            <input type="number" min="0" max="100" value={orderForm.discountPercent} className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setOrderForm({...orderForm, discountPercent: parseFloat(e.target.value) || 0})} />
                                        </div>

                                        <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold hover:bg-blue-700 transition">+ Add To Cart Basket</button>
                                    </form>
                                </div>

                                <div className="lg:col-span-2 bg-slate-900 p-6 rounded-2xl border border-slate-800 flex flex-col justify-between">
                                    <div>
                                        <div className="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                                            <h2 className="text-xl font-bold text-slate-200">ඇණවුම් මල්ල (Invoice Cart Basket)</h2>
                                            <span className="bg-slate-800 text-xs px-3 py-1 rounded-full font-mono text-slate-400">Items: {cart.length}</span>
                                        </div>

                                        {cart.length === 0 ? (
                                            <div className="text-center py-12 text-slate-500 italic">මල්ල හිස්ව පවතී. භාණ්ඩ ඇතුළත් කරන්න.</div>
                                        ) : (
                                            <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                                                {cart.map((item, index) => (
                                                    <div key={index} className="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700/60">
                                                        <div>
                                                            <h4 className="font-bold text-slate-200">{item.item_name}</h4>
                                                            <p className="text-xs text-slate-400">Qty: {item.quantity} x Rs. {item.selling_price} (Disc: {item.discount_rate}%)</p>
                                                        </div>
                                                        <div className="text-right flex items-center space-x-4">
                                                            <span className="font-mono text-emerald-400 font-bold">Rs. {item.total_amount.toFixed(2)}</span>
                                                            <button onClick={() => setCart(cart.filter((_, i) => i !== index))} className="text-red-400 text-xs bg-red-500/10 px-2 py-1 rounded hover:bg-red-500 hover:text-white">Remove</button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {cart.length > 0 && (
                                        <div className="mt-6 border-t border-slate-800 pt-4 space-y-4">
                                            <div>
                                                <label className="text-xs text-slate-400 block mb-1 font-semibold">සම්පූර්ණ බිලට අමතර වට්ටම් (Additional Discount % for Whole Bill):</label>
                                                <input type="number" min="0" max="100" value={additionalDiscountPercent} className="w-full p-2 bg-slate-800 border border-slate-700 rounded-xl text-white font-mono text-sm" onChange={e => setAdditionalDiscountPercent(parseFloat(e.target.value) || 0)} />
                                            </div>
                                            <div className="flex justify-between items-center px-2">
                                                <span className="text-slate-400 text-sm">Estimated Final Total:</span>
                                                <span className="text-2xl font-mono font-black text-emerald-400">
                                                    Rs. {(cart.reduce((s, i) => s + i.total_amount, 0) - (cart.reduce((s, i) => s + i.total_amount, 0) * additionalDiscountPercent / 100)).toFixed(2)}
                                                </span>
                                            </div>
                                            <button onClick={submitCompleteOrder} className="w-full bg-emerald-600 p-4 rounded-xl font-black tracking-wide hover:bg-emerald-700 shadow-xl transition text-center text-lg">
                                                ✅ SUBMIT COMPLETE ORDER
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {!selectedInvoice && view === 'products' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">භාණ්ඩ තොග ලැයිස්තුව (Stock View)</h2>
                                    {user.role === 'ADMIN' && <button onClick={() => setView('add_product')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Add Product</button>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {myProducts.map(p => (
                                        <div key={p.id} className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                            <h4 className="text-lg font-bold">{p.itemName}</h4>
                                            <p className="text-xs text-slate-500">Code: {p.itemCode}</p>
                                            <div className="mt-4 flex justify-between text-sm">
                                                <div>
                                                    {user.role === 'ADMIN' && <p className="text-slate-400">Cost: Rs. {parseFloat(p.costPrice).toFixed(2)}</p>}
                                                    <p className="text-emerald-400 font-bold">Sale: Rs. {parseFloat(p.sellingPrice).toFixed(2)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className={`font-bold ${p.quantity <= p.lowStock ? 'text-red-400' : 'text-slate-200'}`}>{p.quantity} Units</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {!selectedInvoice && view === 'customers' && (
                            <div>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">පාරිභෝගික ලැයිස්තුව</h2>
                                    {user.role === 'ADMIN' && <button onClick={() => setView('add_customer')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Add Customer</button>}
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {myCustomers.map(c => (
                                        <div key={c.id} className="bg-slate-900 p-6 rounded-2xl border border-slate-800">
                                            <h3 className="text-xl font-bold">{c.name}</h3>
                                            <p className="text-sm text-slate-400">Phone: {c.phone} | Address: {c.address}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {user.role === 'ADMIN' && !selectedInvoice && view === 'add_product' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">භාණ්ඩ ඇතුළත් කිරීම</h2>
                                <form onSubmit={handleAddProduct} className="space-y-4">
                                    <input type="text" placeholder="Item Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setProdForm({...prodForm, itemName: e.target.value})} required />
                                    <input type="text" placeholder="Item Code (e.g., S0200301)" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setProdForm({...prodForm, itemCode: e.target.value})} required />
                                    <input type="number" placeholder="Cost Price" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setProdForm({...prodForm, costPrice: parseFloat(e.target.value)})} required />
                                    <input type="number" placeholder="Selling / List Price" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setProdForm({...prodForm, sellingPrice: parseFloat(e.target.value)})} required />
                                    <input type="number" placeholder="Initial Quantity" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setProdForm({...prodForm, quantity: parseInt(e.target.value)})} required />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Save Product</button>
                                </form>
                            </div>
                        )}

                        {user.role === 'ADMIN' && !selectedInvoice && view === 'add_customer' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">නව පාරිභෝගිකයෙකු ඇතුළත් කිරීම</h2>
                                <form onSubmit={handleAddCustomer} className="space-y-4">
                                    <input type="text" placeholder="Customer Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setCustForm({...custForm, name: e.target.value})} required />
                                    <input type="text" placeholder="Phone Number" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setCustForm({...custForm, phone: e.target.value})} required />
                                    <textarea placeholder="Full Billing Address" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white h-24" onChange={e => setCustForm({...custForm, address: e.target.value})}></textarea>
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Save Profile</button>
                                </form>
                            </div>
                        )}

                        {user.role === 'ADMIN' && !selectedInvoice && view === 'employees' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-bold">සේවක ගිණුම් කළමනාකරණය</h2>
                                    <button onClick={() => setView('add_employee')} className="bg-blue-600 px-4 py-2 rounded-xl font-semibold text-sm">+ Create Employee Portal</button>
                                </div>
                                <div className="bg-slate-900 rounded-2xl border border-slate-800 p-6">
                                    {myEmployees.map(emp => (
                                        <div key={emp.id} className="p-3 border-b border-slate-800 flex justify-between">
                                            <span>👤 {emp.fullName}</span>
                                            <span className="text-slate-500">Username: <b className="text-slate-300">{emp.username}</b></span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {user.role === 'ADMIN' && !selectedInvoice && view === 'add_employee' && (
                            <div className="max-w-lg bg-slate-900 p-8 rounded-2xl border border-slate-800 mx-auto">
                                <h2 className="text-xl font-bold mb-4">Create Employee Account</h2>
                                <form onSubmit={handleAddEmployee} className="space-y-4">
                                    <input type="text" placeholder="Employee Full Name" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setEmpForm({...empForm, fullName: e.target.value})} required />
                                    <input type="text" placeholder="Assigned Username" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setEmpForm({...empForm, username: e.target.value})} required />
                                    <input type="password" placeholder="Temporary Password" className="w-full p-3 bg-slate-800 border border-slate-700 rounded-xl text-white" onChange={e => setEmpForm({...empForm, password: e.target.value})} required />
                                    <button type="submit" className="w-full bg-blue-600 p-3 rounded-xl font-bold">Generate Profile</button>
                                </form>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
